name: Terraform Compliance Checks

on:
  pull_request:
    paths:
      - '*.tf'
      - 'compliance/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: 1.0.0
  TERRAFORM_COMPLIANCE_VERSION: 1.3.35

jobs:
  compliance:
    name: Run Terraform Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install terraform-compliance
        run: |
          pip install terraform-compliance==${{ env.TERRAFORM_COMPLIANCE_VERSION }}

      - name: Create test tfvars file
        run: |
          # Create test.tfvars file in the terraform directory
          cat > terraform/test.tfvars <<EOF
          databricks_host         = "https://test.cloud.databricks.com"
          databricks_token        = "dapi123456789"
          catalog_name            = "test_catalog"
          schema_name             = "test_schema"
          environment             = "dev"
          project_name            = "Test Project"
          table_name              = "test_table"
          app_name                = "test-app"
          volume_name             = "test_volume"
          databricks_warehouse_id = "test_warehouse_id"
          EOF

      - name: Terraform Init
        run: |
          # Change to terraform directory before running commands
          cd terraform
          terraform init -backend=false

      - name: Terraform Plan
        run: |
          # Change to terraform directory before running commands
          cd terraform
          terraform plan -var-file=test.tfvars -out=terraform.tfplan

      - name: Convert Terraform Plan
        run: |
          # Change to terraform directory to show the plan
          cd terraform
          terraform show -json terraform.tfplan > terraform-plan.json

      - name: Run Terraform Compliance
        id: compliance
        run: |
          echo "Running terraform-compliance checks..."
          # Use correct paths: terraform-plan.json is in terraform directory, but compliance is in root
          terraform-compliance -f compliance/ -p terraform/terraform-plan.json
        continue-on-error: true

      - name: Post Compliance Results to PR
        if: github.event_name == 'pull_request' && steps.compliance.outcome == 'failure'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            
            // Create a comment with the compliance results
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Terraform Compliance Check Failed\n\nThe pull request contains infrastructure code that does not comply with defined policies. Please review the workflow logs for details.'
            })
            
      - name: Fail if compliance check failed
        if: steps.compliance.outcome == 'failure'
        run: exit 1
