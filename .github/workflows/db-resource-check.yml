name: Database Resource Check and Creation

on:
  push:
    branches: [ main ]
    paths:
      - 'terraform/**'
      - 'streamlit/**'
      - 'notebooks/**'
      - 'scripts/**'
      - 'data/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - prod

# Prevent multiple workflow runs for the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: 3.11
  DATABRICKS_CLI_VERSION: 0.18.0

jobs:
  check-and-create-resources:
    name: Check and Create Database Resources
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: ${{ github.event_name == 'workflow_dispatch' && fromJSON('["' + github.event.inputs.environment + '"]') || fromJSON('["test", "prod"]') }}
    environment:
      name: ${{ matrix.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Databricks CLI
        run: |
          pip install databricks-cli==${{ env.DATABRICKS_CLI_VERSION }}

      - name: Configure Databricks CLI
        run: |
          # Create Databricks CLI config file
          mkdir -p ~/.databrickscfg
          echo "[DEFAULT]" > ~/.databrickscfg/credentials
          echo "host = ${{ secrets.DATABRICKS_HOST }}" >> ~/.databrickscfg/credentials
          echo "token = ${{ secrets.DATABRICKS_TOKEN }}" >> ~/.databrickscfg/credentials

      - name: Set Environment Variables
        run: |
          if [ "${{ matrix.environment }}" == "test" ]; then
            echo "CATALOG_NAME=${{ secrets.DATABRICKS_CATALOG_TEST }}" >> $GITHUB_ENV
          else
            echo "CATALOG_NAME=${{ secrets.DATABRICKS_CATALOG_PROD }}" >> $GITHUB_ENV
          fi
          echo "SCHEMA_NAME=country_currency" >> $GITHUB_ENV
          echo "VOLUME_NAME=country_currency_data" >> $GITHUB_ENV
          echo "TABLE_NAME=country_to_currency" >> $GITHUB_ENV

      - name: Check for Existing Schema
        id: check-schema
        run: |
          echo "Checking if schema $SCHEMA_NAME exists in catalog $CATALOG_NAME..."
          
          # Run the command and capture both stdout and stderr
          output=$(databricks schemas list --catalog=$CATALOG_NAME 2>&1)
          exit_code=$?
          
          # Check if the command was successful
          if [ $exit_code -ne 0 ]; then
            echo "Error checking for schema: $output"
            echo "schema_exists=false" >> $GITHUB_OUTPUT
            exit 0  # Don't fail the workflow
          fi
          
          # Check if the schema exists in the output
          if echo "$output" | grep -q "$SCHEMA_NAME"; then
            echo "Schema $SCHEMA_NAME exists in catalog $CATALOG_NAME"
            echo "schema_exists=true" >> $GITHUB_OUTPUT
          else
            echo "Schema $SCHEMA_NAME does not exist in catalog $CATALOG_NAME"
            echo "schema_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Schema if Not Exists
        if: steps.check-schema.outputs.schema_exists == 'false'
        run: |
          echo "Creating schema $SCHEMA_NAME in catalog $CATALOG_NAME..."
          
          # Create a temporary tfvars file for schema creation
          cat > terraform/schema.tfvars <<EOF
          databricks_host         = "${{ secrets.DATABRICKS_HOST }}"
          databricks_token        = "${{ secrets.DATABRICKS_TOKEN }}"
          catalog_name            = "$CATALOG_NAME"
          schema_name             = "$SCHEMA_NAME"
          environment             = "${{ matrix.environment }}"
          project_name            = "Country Currency"
          table_name              = "$TABLE_NAME"
          app_name                = "country-currency-app"
          volume_name             = "$VOLUME_NAME"
          databricks_warehouse_id = "${{ secrets.DATABRICKS_WAREHOUSE_ID }}"
          skip_validation         = true
          create_schema           = true
          create_volume           = false
          create_table            = false
          upload_csv              = false
          EOF
          
          # Initialize and apply Terraform for schema creation
          cd terraform
          terraform init -upgrade
          terraform apply -auto-approve -var-file=schema.tfvars
          
          echo "Schema creation completed"

      - name: Check for Existing Volume
        id: check-volume
        run: |
          echo "Checking if volume $VOLUME_NAME exists in schema $SCHEMA_NAME..."
          
          # Run the command and capture both stdout and stderr
          output=$(databricks volumes list --catalog=$CATALOG_NAME --schema=$SCHEMA_NAME 2>&1)
          exit_code=$?
          
          # Check if the command was successful
          if [ $exit_code -ne 0 ]; then
            echo "Error checking for volume: $output"
            echo "volume_exists=false" >> $GITHUB_OUTPUT
            exit 0  # Don't fail the workflow
          fi
          
          # Check if the volume exists in the output
          if echo "$output" | grep -q "$VOLUME_NAME"; then
            echo "Volume $VOLUME_NAME exists in schema $SCHEMA_NAME"
            echo "volume_exists=true" >> $GITHUB_OUTPUT
          else
            echo "Volume $VOLUME_NAME does not exist in schema $SCHEMA_NAME"
            echo "volume_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Volume if Not Exists
        if: steps.check-volume.outputs.volume_exists == 'false'
        run: |
          echo "Creating volume $VOLUME_NAME in schema $SCHEMA_NAME..."
          
          # Create a temporary tfvars file for volume creation
          cat > terraform/volume.tfvars <<EOF
          databricks_host         = "${{ secrets.DATABRICKS_HOST }}"
          databricks_token        = "${{ secrets.DATABRICKS_TOKEN }}"
          catalog_name            = "$CATALOG_NAME"
          schema_name             = "$SCHEMA_NAME"
          environment             = "${{ matrix.environment }}"
          project_name            = "Country Currency"
          table_name              = "$TABLE_NAME"
          app_name                = "country-currency-app"
          volume_name             = "$VOLUME_NAME"
          databricks_warehouse_id = "${{ secrets.DATABRICKS_WAREHOUSE_ID }}"
          skip_validation         = true
          create_schema           = false
          create_volume           = true
          create_table            = false
          upload_csv              = false
          EOF
          
          # Initialize and apply Terraform for volume creation
          cd terraform
          terraform init -upgrade
          terraform apply -auto-approve -var-file=volume.tfvars
          
          echo "Volume creation completed"

      - name: Check for Existing Tables
        id: check-table
        run: |
          echo "Checking if table $TABLE_NAME exists in schema $SCHEMA_NAME..."
          
          # Run the command and capture both stdout and stderr
          output=$(databricks tables list --catalog=$CATALOG_NAME --schema=$SCHEMA_NAME 2>&1)
          exit_code=$?
          
          # Check if the command was successful
          if [ $exit_code -ne 0 ]; then
            echo "Error checking for table: $output"
            echo "table_exists=false" >> $GITHUB_OUTPUT
            exit 0  # Don't fail the workflow
          fi
          
          # Check if the table exists in the output
          if echo "$output" | grep -q "$TABLE_NAME"; then
            echo "Table $TABLE_NAME exists in schema $SCHEMA_NAME"
            echo "table_exists=true" >> $GITHUB_OUTPUT
          else
            echo "Table $TABLE_NAME does not exist in schema $SCHEMA_NAME"
            echo "table_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Table if Not Exists
        if: steps.check-table.outputs.table_exists == 'false'
        run: |
          echo "Creating table $TABLE_NAME in schema $SCHEMA_NAME..."
          
          # Create a temporary tfvars file for table creation
          cat > terraform/table.tfvars <<EOF
          databricks_host         = "${{ secrets.DATABRICKS_HOST }}"
          databricks_token        = "${{ secrets.DATABRICKS_TOKEN }}"
          catalog_name            = "$CATALOG_NAME"
          schema_name             = "$SCHEMA_NAME"
          environment             = "${{ matrix.environment }}"
          project_name            = "Country Currency"
          table_name              = "$TABLE_NAME"
          app_name                = "country-currency-app"
          volume_name             = "$VOLUME_NAME"
          databricks_warehouse_id = "${{ secrets.DATABRICKS_WAREHOUSE_ID }}"
          skip_validation         = true
          create_schema           = false
          create_volume           = false
          create_table            = true
          upload_csv              = true
          EOF
          
          # Initialize and apply Terraform for table creation
          cd terraform
          terraform init -upgrade
          terraform apply -auto-approve -var-file=table.tfvars
          
          echo "Table creation completed"

      - name: Summarize Resource Status
        run: |
          echo "Resource Status Summary for ${{ matrix.environment }} Environment:"
          echo "-------------------------------------------------------------"
          echo "Catalog: $CATALOG_NAME"
          echo "Schema: $SCHEMA_NAME - $([ "${{ steps.check-schema.outputs.schema_exists }}" == "true" ] && echo "Exists" || echo "Created")"
          echo "Volume: $VOLUME_NAME - $([ "${{ steps.check-volume.outputs.volume_exists }}" == "true" ] && echo "Exists" || echo "Created")"
          echo "Table: $TABLE_NAME - $([ "${{ steps.check-table.outputs.table_exists }}" == "true" ] && echo "Exists" || echo "Created")"
          echo "-------------------------------------------------------------"
          echo "Database resources check and creation completed successfully."

  deploy:
    name: Deploy to Environment
    needs: check-and-create-resources
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: ${{ github.event_name == 'workflow_dispatch' && fromJSON('["' + github.event.inputs.environment + '"]') || fromJSON('["test", "prod"]') }}
    environment:
      name: ${{ matrix.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.11
          terraform_wrapper: false

      - name: Create terraform.tfvars
        run: |
          if [ "${{ matrix.environment }}" == "test" ]; then
            CATALOG_NAME="${{ secrets.DATABRICKS_CATALOG_TEST }}"
          else
            CATALOG_NAME="${{ secrets.DATABRICKS_CATALOG_PROD }}"
          fi
          
          cat > terraform/terraform.tfvars <<EOF
          databricks_host         = "${{ secrets.DATABRICKS_HOST }}"
          databricks_token        = "${{ secrets.DATABRICKS_TOKEN }}"
          catalog_name            = "$CATALOG_NAME"
          schema_name             = "country_currency"
          environment             = "${{ matrix.environment }}"
          project_name            = "Country Currency"
          table_name              = "country_to_currency"
          app_name                = "country-currency-app"
          volume_name             = "country_currency_data"
          databricks_warehouse_id = "${{ secrets.DATABRICKS_WAREHOUSE_ID }}"
          skip_validation         = true
          create_schema           = false
          create_volume           = false
          create_table            = false
          upload_csv              = false
          EOF

      - name: Terraform Init
        id: init
        run: |
          cd terraform
          terraform init -upgrade

      - name: Terraform Validate
        id: validate
        run: |
          cd terraform
          terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          cd terraform
          terraform plan -no-color -var-file=terraform.tfvars
        continue-on-error: true

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        id: apply
        run: |
          cd terraform
          terraform apply -auto-approve -var-file=terraform.tfvars

      - name: Trigger Data Load Job
        if: matrix.environment == 'test'
        run: |
          # Extract job ID from Terraform output
          cd terraform
          JOB_ID=$(terraform output -raw job_id)

          echo "Manually triggering job $JOB_ID to load country-currency data for ${{ matrix.environment }} environment..."
          response=$(curl -s -w "\n%%{http_code}" -X POST "${{ secrets.DATABRICKS_HOST }}/api/2.1/jobs/run-now" \
            -H "Authorization: Bearer ${{ secrets.DATABRICKS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"job_id\": $JOB_ID}")

          status_code=$(echo "$response" | tail -n1)
          response_body=$(echo "$response" | sed '$d')

          if [ "$status_code" -eq 200 ]; then
            run_id=$(echo "$response_body" | grep -o '"run_id":[0-9]*' | cut -d':' -f2)
            echo "Job triggered successfully! Run ID: $run_id"
          else
            echo "Failed to trigger job. Status code: $status_code"
            echo "Response: $response_body"
            # Don't fail the pipeline if job triggering fails, as the job can be run manually later
            echo "Job will need to be triggered manually in the Databricks workspace"
          fi